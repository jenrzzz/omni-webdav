ServerName omni.jfave.com

# Make MOVE/COPY work behind Traefik's TLS termination: the client's Destination
# header is https:// but Apache speaks http:// internally, and mod_dav rejects the
# mismatch with 502. Rewrite it before mod_dav inspects it. Requires mod_headers.
RequestHeader edit Destination ^https: http: early

<VirtualHost *:80>
    ServerName omni.jfave.com
    ServerAdmin webmaster@localhost
    DocumentRoot /var/lib/dav

    <Directory /var/lib/dav>
        DAV On

        AuthType Basic
        AuthName "omni.jfave.com"
        AuthUserFile /etc/apache2/webdav.password
        Require valid-user

        Options Indexes
    </Directory>

    # Unauthenticated health endpoint for the Docker/Coolify probe. Coolify's built-in probe is
    # a plain wget that treats any non-2xx as failure, so it can't accept the DAV root's 401 —
    # hence a dedicated 200. Aliased OUTSIDE the DAV tree so it bypasses the Basic-auth above and
    # exposes nothing but the literal string "ok" (no DAV, no directory listing, no data).
    Alias /healthz /var/www/health/index.html
    <Directory /var/www/health>
        DAV Off
        Options None
        Require all granted
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
